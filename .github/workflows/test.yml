name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        run: go build -o gset .

      - name: Run test files
        run: |
          ./gset transpile test/variables.gset
          ./gset transpile test/for_loops.gset
          ./gset transpile test/while_loops.gset
          ./gset transpile test/conditionals.gset
          ./gset transpile test/functions.gset
          ./gset transpile test/comprehensive.gset

      - name: Verify build output
        run: |
          ./gset transpile test/comprehensive.gset > /tmp/output.go
          if grep -q "func main" /tmp/output.go; then
            echo "✓ Functions generated correctly"
          fi
          if grep -q "for i in" /tmp/output.go; then
            echo "✓ For loops generated correctly"
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Format check
        run: |
          go fmt ./...
          git diff --exit-code

  cross-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          OUTPUT="gset-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            OUTPUT="${OUTPUT}.exe"
          fi
          GOOS=$GOOS GOARCH=$GOARCH go build -o "$OUTPUT" .
