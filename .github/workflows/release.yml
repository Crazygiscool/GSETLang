name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64, 386]
        exclude:
          - goos: darwin
            goarch: 386
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          OUTPUT_NAME="gset-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            OUTPUT_NAME="${OUTPUT_NAME}.exe"
          fi
          GOOS=$GOOS GOARCH=$GOARCH go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.VERSION }}" -o "$OUTPUT_NAME" .

      - name: Create archive
        env:
          GOOS: ${{ matrix.goos }}
        run: |
          if [ "$GOOS" = "windows" ]; then
            7z a "gset-${{ matrix.goos }}-${{ matrix.goarch }}.zip" "gset-${{ matrix.goos }}-${{ matrix.goarch }}.exe"
          else
            tar -czf "gset-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" "gset-${{ matrix.goos }}-${{ matrix.goarch }}"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gset-${{ matrix.goos }}-${{ matrix.goarch }}
          path: gset-${{ matrix.goos }}-${{ matrix.goarch }}*
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Create checksums
        working-directory: dist
        run: |
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Generate Release Notes
        id: notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          
          cat > RELEASE_NOTES.md << 'EOF'
          # GSET v$VERSION Release

          ## What's New
          
          This release includes major production-ready improvements:
          
          - Comprehensive unit tests for all core packages
          - Security hardening with input validation
          - Parser depth tracking and limits
          - Config validation with dangerous command detection
          - Structured logging
          - Graceful shutdown handling
          - Benchmark tests
          - Race detector support
          
          ## Installation
          
          ### Linux / macOS / Windows (Git Bash)
          ```bash
          curl -fsSL https://raw.githubusercontent.com/Crazygiscool/GSETLang/main/install.sh | bash
          ```
          
          ### Windows (Winget)
          ```powershell
          winget install GSETLang.GSET
          ```
          
          ### Windows (Scoop)
          ```powershell
          scoop bucket add extras
          scoop install gset
          ```
          
          ### Manual Install
          Download the appropriate archive for your platform from the assets below.
          
          ## Supported Platforms
          
          - Linux amd64, arm64, 386
          - macOS amd64, arm64
          - Windows amd64, 386
          
          ## Checksums
          
          Verify your downloads using the SHA256SUMS.txt file.
          
          ---
          
          **Full Changelog**: https://github.com/Crazygiscool/GSETLang/compare/v2.1.3...$VERSION
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
